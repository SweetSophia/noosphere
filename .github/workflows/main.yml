name: Roo Code Auto-Review (Z.ai GLM)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Roo Code Review
        uses: rooveterinaryinc/roo-code-action@v1
        with:
          # Use OpenAI-compatible mode for direct Z.ai integration
          provider: "openai-compatible"
          
          # Official international endpoint for Z.ai
          base-url: "https://api.z.ai/api/paas/v4"
          
          # Ensure you configure this exact secret name in your repository
          api-key: ${{ secrets.ZAI_API_KEY }}
          
          # Specify the model included in the GLM Coding Plan
          model: "glm-5.1"
          
          instructions: |
            Act as a Senior Software Engineer.
            Analyze the Pull Request for:
            1. Logic errors and edge cases.
            2. Performance regressions (especially regarding O(n) complexity).
            3. Adherence to Clean Code principles.
            Respond precisely and provide concrete code improvements.
