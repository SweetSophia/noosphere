name: Minimax Auto-Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: AI PR Reviewer
        uses: sourcefuse/ai-pr-reviewer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.MINIMAX_API_KEY }}
          
          # Official international OpenAI-compatible endpoint for Minimax
          openai_base_url: "https://api.minimax.io/v1"
          
          # Verified model string for Minimax's high-speed M2.7
          openai_light_model: "MiniMax-M2.7-highspeed"
          openai_heavy_model: "MiniMax-M2.7-highspeed"
          
          system_message: |
            Act as a Senior Software Engineer.
            Analyze the Pull Request for:
            1. Logic errors and edge cases.
            2. Performance regressions (especially regarding O(n) complexity).
            3. Adherence to Clean Code principles.
            Respond precisely and provide concrete code improvements.
