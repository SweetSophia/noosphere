name: AI PR Reviewer

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}-${{ github.event_name == 'pull_request_review_comment' && 'pr_comment' || 'pr' }}
  cancel-in-progress: ${{ github.event_name != 'pull_request_review_comment' }}

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI PR Reviewer
        uses: sourcefuse/ai-pr-reviewer@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_API_BASE_URL: "https://api.minimax.io/v1"
        with:
          openai_light_model: "MiniMax-M2.7"
          openai_heavy_model: "MiniMax-M2.7"
          system_message: |
            Act as a Senior Software Engineer.
            Analyze the Pull Request for:
            1. Logic errors and edge cases.
            2. Performance regressions (especially regarding O(n) complexity).
            3. Adherence to Clean Code principles.
            Respond precisely and provide concrete code improvements.
