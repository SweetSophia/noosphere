name: Publish Noosphere Docker image

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "next.config.ts"
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "VERSION"
      - "docker-compose.yml"
      - "docker/**"
      - "!docker/postgres-pgvector/**"
      - "scripts/sync-version.mjs"
      - "noosphere-injected-memory/**"
      - "openclaw-noosphere-memory/**"
  pull_request:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - "next.config.ts"
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "VERSION"
      - "docker-compose.yml"
      - "docker/**"
      - "!docker/postgres-pgvector/**"
      - "scripts/sync-version.mjs"
      - "noosphere-injected-memory/**"
      - "openclaw-noosphere-memory/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    # Skip Docker build for plugin version tags — Docker image only contains
    # the OpenClaw plugin; Opencode, Kilo Code, and Hermes plugins are distributed via npm.
    if: "!startsWith(github.ref, 'refs/tags/v-opencode-') && !startsWith(github.ref, 'refs/tags/v-kilocode-') && !startsWith(github.ref, 'refs/tags/v-hermes-')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate version metadata
        run: |
          npm run version:check
          echo "NOOSPHERE_VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Verify shared injected-memory dist is current
        run: |
          cd noosphere-injected-memory
          npm ci
          npm run build
          git diff --exit-code -- dist

      - name: Verify OpenClaw plugin dist is current
        run: |
          cd openclaw-noosphere-memory
          npm ci
          npm run build
          git diff --exit-code -- dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/noosphere
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            # Note: prisma generate doesn't need a real database connection,
            # just a valid-format URL. Runtime DATABASE_URL comes from docker-compose env.
            DATABASE_URL=postgresql://placeholder@localhost/placeholder
            NOOSPHERE_VERSION=${{ env.NOOSPHERE_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
