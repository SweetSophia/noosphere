name: Publish Noosphere Docker image

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "next.config.ts"
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "openclaw-noosphere-memory/**"
  pull_request:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - "next.config.ts"
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "openclaw-noosphere-memory/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify OpenClaw plugin dist is current
        run: |
          cd openclaw-noosphere-memory
          npm ci
          npm run build
          git diff --exit-code -- dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/noosphere
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            # Note: prisma generate doesn't need a real database connection,
            # just a valid-format URL. Runtime DATABASE_URL comes from docker-compose env.
            DATABASE_URL=postgresql://placeholder@localhost/placeholder
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
