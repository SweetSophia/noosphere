name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check package publishing policy
        run: npm run package-policy:check

      - name: Check PostgreSQL image distribution policy
        run: npm run postgres-image:check -- --verify-remote

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    env:
      NOOSPHERE_BOOTSTRAP_DATABASE_URL: postgresql://test:test@localhost:5432/test
      DATABASE_URL: postgresql://noosphere_app:test-application@localhost:5432/test
      NOOSPHERE_APP_DATABASE_URL: postgresql://noosphere_app:test-application@localhost:5432/test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Provision separate database identities
        run: node docker/provision-database-roles.mjs
        env:
          DATABASE_URL: postgresql://noosphere_migrator:test-migrator@localhost:5432/test

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://noosphere_migrator:test-migrator@localhost:5432/test

      - name: Grant runtime access after migrations
        run: node docker/provision-database-roles.mjs
        env:
          DATABASE_URL: postgresql://noosphere_migrator:test-migrator@localhost:5432/test

      - name: Create .env.test for test scripts
        run: |
          printf '%s\n' \
            'DATABASE_URL=postgresql://noosphere_app:test-application@localhost:5432/test' \
            'REDIS_URL=redis://localhost:6379' > .env.test

      - name: Build against the extension-less application identity
        run: npm run build
        env:
          DATABASE_URL: postgresql://noosphere_app:test-application@localhost:5432/test

      - name: Run memory tests
        run: npm run test:memory

      - name: Run persistence-layer tests
        run: npm run test:persistence-layer

      - name: Run API tests
        run: npm run test:api

      - name: Run wiki and keyword-search tests
        run: npm run test:wiki

      - name: Run rate-limit tests
        run: npm run test:rate-limit
        env:
          REDIS_URL: redis://localhost:6379

      - name: Run security tests
        run: npm run test:security

      - name: Verify keyword-only runtime made no feature DDL
        run: node scripts/verify-keyword-only-database.mjs
        env:
          DATABASE_URL: postgresql://noosphere_migrator:test-migrator@localhost:5432/test
