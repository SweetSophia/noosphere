name: noosphere

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://noosphere:buildtime@db:5432/noosphere
        NOOSPHERE_VERSION: ${NOOSPHERE_VERSION:-1.10.0}
    container_name: noosphere-app
    restart: unless-stopped
    labels:
      org.opencontainers.image.version: "${NOOSPHERE_VERSION:-1.10.0}"
    ports:
      - "6578:3000"
    environment:
      DATABASE_URL: postgresql://noosphere:${POSTGRES_PASSWORD}@db:5432/noosphere
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${APP_URL:-http://100.111.85.48:6578}
      APP_URL: ${APP_URL:-http://100.111.85.48:6578}
      UPLOAD_DIR: /app/uploads
      OBSIDIAN_SYNC_ENABLED: ${OBSIDIAN_SYNC_ENABLED:-true}
      OBSIDIAN_SYNC_VAULT_PATH: ${OBSIDIAN_SYNC_VAULT_PATH:-/app/obsidian-vault}
      PG_POOL_MAX: ${PG_POOL_MAX:-20}
      PG_IDLE_TIMEOUT_MS: ${PG_IDLE_TIMEOUT_MS:-30000}
      PG_CONN_TIMEOUT_MS: ${PG_CONN_TIMEOUT_MS:-5000}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./uploads:/app/uploads:rw
      - ./uploads/images:/app/uploads/images:rw
      - /home/niya/obsidian-vault/noosphere:/app/obsidian-vault:rw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  db:
    image: postgres:16-alpine
    container_name: noosphere-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: noosphere
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: noosphere
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noosphere -d noosphere"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: noosphere-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    name: noosphere_postgres_data
    driver: local
  redis_data:
    name: noosphere_redis_data
    driver: local

networks:
  default:
    external: true
    name: noosphere-net
